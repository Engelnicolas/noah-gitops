---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 30m
  chart:
    spec:
      chart: headlamp
      version: '>=0.23.0 <1.0.0'
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    config:
      oidc:
        secret:
          create: false
          name: headlamp-oidc
        issuerURL: https://auth.noah-infra.com/application/o/headlamp/
        scopes: openid profile email groups
    ingress:
      enabled: true
      className: cilium
      hosts:
        - host: headlamp.noah-infra.com
          paths:
            - path: /
              type: Prefix
      tls:
        - secretName: headlamp-tls
          hosts: [headlamp.noah-infra.com]
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
