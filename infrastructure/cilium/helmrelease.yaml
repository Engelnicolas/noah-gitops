---
# Cilium replaces flannel + kube-proxy (which K3s was started with
# --flannel-backend=none and --disable-network-policy). Hubble UI is
# enabled but exposed only via the hubble-auth Authentik proxy — no
# unauthenticated ingress.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: '>=1.15.0 <2.0.0'
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    kubeProxyReplacement: true
    # k8sServiceHost / k8sServicePort are patched per-cluster via
    # postBuild substitutions in clusters/production/infrastructure.yaml
    # if you run multiple clusters from the same repo.
    k8sServiceHost: "127.0.0.1"
    k8sServicePort: 6443
    operator:
      replicas: 1
    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true
        # No ingress at the chart level — exposed via hubble-auth.
        ingress:
          enabled: false
    ingressController:
      enabled: true
      loadbalancerMode: dedicated
      default: true
    gatewayAPI:
      enabled: false
